# domain.yml
#
# WHY THERE ARE NO INTENTS HERE
# ------------------------------
# In the old Rasa (open source 3.x), you had to define intents here and
# provide training examples in nlu.yml. The NLU classifier would then
# match user messages to those intents.
#
# In Rasa Pro CALM, the LLM reads the *descriptions* in data/flows.yml
# and decides which flow to trigger. No intent classification needed.
# This means:
#   - No nlu.yml needed
#   - No rules.yml needed
#   - No intents section here
#   - No forms section here
#
# SLOT MAPPINGS: from_llm vs from_text
# ------------------------------------
# Old approach: type: from_text
#   Captured whatever the user said verbatim. Required our Python code
#   to parse "about 160 people" → 160.0 using regex.
#
# CALM approach: type: from_llm
#   The LLM extracts the value. "About 160 people", "one-sixty", and
#   "we're expecting around 160" all become 160.0 automatically.
#   No regex. No validation class. The LLM handles natural language.
#
# type: controlled
#   These slots are set by custom actions (action_validate_booking),
#   not by user input.

version: "3.1"

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: false

slots:
  guest_count:
    type: float
    mappings:
      - type: from_llm

  vegan_count:
    type: float
    mappings:
      - type: from_llm

  deposit_amount_gbp:
    type: float
    mappings:
      - type: from_llm

  # Set by action_validate_booking — not collected from user input
  booking_valid:
    type: bool
    mappings:
      - type: controlled

  rejection_reason:
    type: text
    mappings:
      - type: controlled

responses:
  # CALM calls utter_ask_{slot_name} automatically when collecting a slot.
  # These are the questions the agent asks in order.

  utter_ask_guest_count:
    - text: "How many guests are you confirming for tonight's event?"

  utter_ask_vegan_count:
    - text: "And how many of those guests will need vegan meals?"

  utter_ask_deposit_amount_gbp:
    - text: "What deposit amount in GBP are you proposing to secure the booking?"

  # Used when a request falls outside the confirm_booking flow scope.
  utter_out_of_scope:
    - text: >
        I can only help with confirming tonight's venue booking.
        For anything else, please contact the event organiser directly.

  # Fallback when CALM can't determine what the user wants.
  utter_default:
    - text: >
        I didn't quite catch that. I'm here to confirm tonight's
        venue booking — how many guests are you expecting?

actions:
  - action_validate_booking
